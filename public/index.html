<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AniTrack — Track Anime, Manga, K-Drama, Movies & More</title>
    <meta name="description" content="Free tracker for anime, manga, manhwa, K-dramas, movies and more. Track progress, rate titles and find where to watch." />
    <meta name="keywords" content="anime tracker, manga tracker, manhwa tracker, k-drama tracker, media tracker" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00C896" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AniTrack" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />

    <!-- OG / Twitter -->
    <meta property="og:title" content="AniTrack — Track Anime, Manga, K-Drama & More" />
    <meta property="og:description" content="Free tracker for anime, manga, manhwa, K-dramas, movies and more." />
    <meta property="og:url" content="https://ani-track-plum.vercel.app" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <link rel="canonical" href="https://ani-track-plum.vercel.app" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('AniTrack SW registered'))
            .catch((e) => console.log('SW registration failed:', e));
        });
      }
    </script>
  </body>
</html>
